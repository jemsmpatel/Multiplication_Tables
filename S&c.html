<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Math Quiz</title>

  <!-- Tailwind should be self-closed script tag -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Define handleEnter BEFORE usage -->
  <script>
    function handleEnter(e) {
      if (e.key === 'Enter') {
        checkAnswer();
      }
    }
  </script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">

<div class="w-full max-w-md p-6 bg-gray-800 rounded-2xl shadow-xl">
  <h1 class="text-2xl font-bold text-center mb-4">🔥 Math Quiz</h1>

  <div id="setup">
    <label class="block mb-2">Select Mode:</label>
    <select id="mode" class="w-full p-2 rounded bg-gray-700 mb-4">
      <option value="square">Square</option>
      <option value="cube">Cube</option>
    </select>

    <label class="block mb-2">Enter Min Number:</label>
    <input id="minNum" type="number" class="w-full p-2 rounded bg-gray-700 mb-4" placeholder="e.g. 1">

    <label class="block mb-2">Enter Max Number:</label>
    <input id="maxNum" type="number" class="w-full p-2 rounded bg-gray-700 mb-4" placeholder="e.g. 20">

    <button onclick="startQuiz()" class="w-full bg-blue-500 hover:bg-blue-600 p-2 rounded">Start Quiz</button>
  </div>

  <div id="quiz" class="hidden">
    <p id="question" class="text-xl mb-4"></p>

    <input id="answer" type="number" onkeydown="handleEnter(event)" class="w-full p-2 rounded bg-gray-700 mb-4" placeholder="Type answer">

    <button onclick="checkAnswer()" class="w-full bg-green-500 hover:bg-green-600 p-2 rounded mb-2">Submit</button>

    <p id="feedback" class="text-center"></p>
    <p id="attempts" class="text-sm text-gray-400 text-center"></p>
  </div>

  <div id="result" class="hidden text-center">
    <h2 class="text-xl font-bold mb-4">🎉 Quiz Completed!</h2>
    <p id="score" class="mb-2"></p>
    <div id="details" class="text-sm text-gray-300 mb-4"></div>
    <button onclick="restartQuiz()" class="w-full bg-purple-500 hover:bg-purple-600 p-2 rounded">Restart Quiz</button>
  </div>
</div>

<script>
let numbers = [];
let current = null;
let mode = '';
let attempts = 0;

let totalQuestions = 0;
let correctCount = 0;
let wrongCount = 0;
let attemptDetails = [];

function startQuiz() {
  mode = document.getElementById('mode').value;
  const min = parseInt(document.getElementById('minNum').value);
  const max = parseInt(document.getElementById('maxNum').value);

  if (!min || !max || min < 1 || max < min) {
    alert('Enter valid min & max');
    return;
  }

  numbers = [];
  for (let i = min; i <= max; i++) numbers.push(i);

  totalQuestions = numbers.length;
  correctCount = 0;
  wrongCount = 0;
  attemptDetails = [];

  shuffle(numbers);

  document.getElementById('setup').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  document.getElementById('result').classList.add('hidden');

  nextQuestion();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function nextQuestion() {
  if (numbers.length === 0) {
    showResult();
    return;
  }

  current = numbers.pop();
  attempts = 0;

  document.getElementById('feedback').innerText = '';
  document.getElementById('attempts').innerText = '';
  document.getElementById('answer').value = '';

  document.getElementById('question').innerText = mode === 'square'
    ? `${current}² = ?`
    : `${current}³ = ?`;
}

function checkAnswer() {
  const userAns = parseInt(document.getElementById('answer').value);
  const correct = mode === 'square'
    ? current * current
    : current * current * current;

  if (userAns === correct) {
    correctCount++;
    attemptDetails.push(`${current} → solved in ${attempts + 1} attempt(s)`);
    document.getElementById('feedback').innerText = '✅ Correct!';
    setTimeout(nextQuestion, 800);
  } else {
    attempts++;
    if (attempts >= 3) {
      wrongCount++;
      attemptDetails.push(`${current} → failed (Correct: ${correct})`);
      document.getElementById('feedback').innerText = `❌ Wrong! Correct: ${correct}`;
      setTimeout(nextQuestion, 1200);
    } else {
      document.getElementById('feedback').innerText = '❌ Wrong! Try again';
      document.getElementById('attempts').innerText = `Attempts left: ${3 - attempts}`;
    }
  }
}

function showResult() {
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');

  document.getElementById('score').innerText =
    `✅ Correct: ${correctCount} | ❌ Wrong: ${wrongCount}`;

  document.getElementById('details').innerHTML = attemptDetails.join('<br>');
}

function restartQuiz() {
  document.getElementById('setup').classList.remove('hidden');
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
}
</script>

</body>
</html>
